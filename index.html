<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassNotes — Registra & Organizza Lezioni</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --ink: #1a1208;
    --paper: #faf8f3;
    --cream: #f2ede0;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #b85c38;
    --sage: #5a7a5e;
    --line: #ddd8cc;
    --shadow: rgba(26,18,8,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Lined paper background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        transparent,
        transparent 31px,
        var(--line) 31px,
        var(--line) 32px
      );
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  /* Red margin line */
  body::after {
    content: '';
    position: fixed;
    left: 72px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: rgba(184, 92, 56, 0.3);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 40px 80px 90px;
  }

  /* HEADER */
  header {
    margin-bottom: 48px;
    border-bottom: 3px double var(--gold);
    padding-bottom: 24px;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .header-sub {
    font-size: 0.85rem;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .date-line {
    font-size: 0.9rem;
    color: #8a7a5a;
    font-style: italic;
  }

  /* LESSON META */
  .lesson-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .meta-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .meta-field label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .meta-field input {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--line);
    padding: 6px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .meta-field input:focus {
    border-bottom-color: var(--gold);
  }

  .meta-field input::placeholder { color: #bbb0a0; }

  /* SECTION TITLES */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  /* RECORDING SECTION */
  .recording-section {
    margin-bottom: 40px;
  }

  .rec-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }

  .btn-rec {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .btn-rec.idle {
    background: var(--rust);
    color: white;
    box-shadow: 0 4px 16px rgba(184,92,56,0.35);
  }

  .btn-rec.idle:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(184,92,56,0.45);
  }

  .btn-rec.recording {
    background: var(--rust);
    color: white;
    animation: pulse-rec 1.4s infinite;
  }

  @keyframes pulse-rec {
    0%, 100% { box-shadow: 0 0 0 0 rgba(184,92,56,0.5); }
    50% { box-shadow: 0 0 0 12px rgba(184,92,56,0); }
  }

  .rec-status {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .rec-label {
    font-weight: 600;
    font-size: 0.95rem;
  }

  .rec-timer {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--rust);
    letter-spacing: 0.05em;
  }

  .rec-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--rust);
    margin-right: 6px;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* TRANSCRIPT BOX */
  .transcript-box {
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    padding: 20px;
    min-height: 160px;
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--ink);
    position: relative;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.04);
  }

  .transcript-box.editable {
    outline: none;
    white-space: pre-wrap;
    cursor: text;
  }

  .transcript-box.editable:focus {
    border-color: var(--gold);
  }

  .transcript-placeholder {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #c0b8a8;
    font-style: italic;
    pointer-events: none;
    font-size: 0.95rem;
  }

  .transcript-info {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 0.8rem;
    color: #9a8f7a;
  }

  /* AUDIO LIST */
  .audio-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }

  .audio-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 0.88rem;
  }

  .audio-item audio {
    flex: 1;
    height: 32px;
  }

  .audio-item .audio-meta {
    white-space: nowrap;
    color: #8a7a5a;
    font-size: 0.78rem;
  }

  /* NOTES SECTION */
  .notes-section {
    margin-bottom: 40px;
  }

  .notes-textarea {
    width: 100%;
    min-height: 200px;
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    padding: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    line-height: 1.85;
    color: var(--ink);
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.04);
  }

  .notes-textarea:focus { border-color: var(--gold); }
  .notes-textarea::placeholder { color: #c0b8a8; font-style: italic; }

  /* AI SECTION */
  .ai-section {
    margin-bottom: 40px;
  }

  .ai-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .ai-opt-btn {
    background: var(--cream);
    border: 1.5px solid var(--line);
    border-radius: 4px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .ai-opt-btn:hover {
    border-color: var(--gold);
    background: var(--gold-light);
  }

  .ai-opt-btn.active {
    border-color: var(--gold);
    background: var(--gold-light);
  }

  .ai-opt-btn .opt-icon { font-size: 1.2rem; }
  .ai-opt-btn .opt-desc { font-size: 0.72rem; color: #8a7a5a; }

  .ai-result {
    background: white;
    border: 1.5px solid var(--sage);
    border-radius: 4px;
    padding: 20px;
    font-size: 0.95rem;
    line-height: 1.85;
    color: var(--ink);
    min-height: 120px;
    white-space: pre-wrap;
    position: relative;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
  }

  .ai-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--sage);
    color: white;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .ai-loading {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #8a7a5a;
    font-style: italic;
    font-size: 0.9rem;
  }

  .dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    margin: 0 2px;
    animation: dot-bounce 1.2s infinite;
  }

  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* ACTION BUTTONS */
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid transparent;
    letter-spacing: 0.02em;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .btn-primary:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
  }

  .btn-outline {
    background: transparent;
    color: var(--ink);
    border-color: var(--line);
  }

  .btn-outline:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .btn-gold {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
  }

  .btn-gold:hover {
    background: var(--ink);
    color: var(--paper);
  }

  .btn-sage {
    background: var(--sage);
    color: white;
    border-color: var(--sage);
  }

  .btn-sage:hover { opacity: 0.85; }

  /* SAVED SESSIONS */
  .sessions-section {
    margin-bottom: 40px;
  }

  .sessions-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .session-card {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px 18px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    cursor: pointer;
    transition: all 0.2s;
  }

  .session-card:hover {
    border-color: var(--gold);
    box-shadow: 0 2px 12px var(--shadow);
  }

  .session-card .s-title {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 4px;
  }

  .session-card .s-meta {
    font-size: 0.78rem;
    color: #8a7a5a;
  }

  .session-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .s-btn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 4px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    transition: all 0.15s;
  }

  .s-btn:hover { border-color: var(--gold); color: var(--gold); }
  .s-btn.del:hover { border-color: var(--rust); color: var(--rust); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 4px;
    font-size: 0.88rem;
    font-weight: 500;
    z-index: 1000;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    max-width: 320px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.success { border-left: 3px solid var(--sage); }
  .toast.error { border-left: 3px solid var(--rust); }

  /* DIVIDER */
  .divider {
    border: none;
    border-top: 1px dashed var(--line);
    margin: 32px 0;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--line);
    margin-bottom: 24px;
  }

  .tab-btn {
    background: none;
    border: none;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: #8a7a5a;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: var(--gold);
    font-weight: 600;
  }

  .tab-btn:hover:not(.active) { color: var(--ink); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* COPY SUCCESS */
  @keyframes flash {
    0%, 100% { background: white; }
    50% { background: var(--gold-light); }
  }

  .flash { animation: flash 0.5s ease; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .app { padding: 32px 20px 60px 30px; }
    body::after { left: 20px; }
    .ai-options { grid-template-columns: 1fr 1fr; }
    .lesson-meta { grid-template-columns: 1fr; }
    h1 { font-size: 2rem; }
  }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: #a09080;
    font-style: italic;
    font-size: 0.9rem;
  }

  .word-count {
    font-size: 0.78rem;
    color: #a09080;
    text-align: right;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="header-top">
      <h1>ClassNotes</h1>
      <span class="header-sub">Quaderno Digitale</span>
    </div>
    <div class="date-line" id="currentDate"></div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('nuova')">✏️ Nuova Lezione</button>
    <button class="tab-btn" onclick="switchTab('salvate')">📚 Lezioni Salvate</button>
  </div>

  <!-- TAB: NUOVA LEZIONE -->
  <div id="tab-nuova" class="tab-panel active">

    <!-- META -->
    <div class="lesson-meta">
      <div class="meta-field">
        <label>Materia / Corso</label>
        <input type="text" id="metaSubject" placeholder="Es. Matematica, Storia dell'Arte...">
      </div>
      <div class="meta-field">
        <label>Professore / Docente</label>
        <input type="text" id="metaTeacher" placeholder="Es. Prof. Rossi">
      </div>
      <div class="meta-field">
        <label>Titolo Lezione</label>
        <input type="text" id="metaTitle" placeholder="Es. Derivate e integrali">
      </div>
      <div class="meta-field">
        <label>Data</label>
        <input type="date" id="metaDate">
      </div>
    </div>

    <!-- REGISTRAZIONE -->
    <div class="recording-section">
      <div class="section-title">🎙 Registrazione Audio</div>

      <div class="rec-controls">
        <button class="btn-rec idle" id="recBtn" onclick="toggleRecording()">🎙</button>
        <div class="rec-status">
          <div class="rec-label" id="recLabel">Premi per registrare</div>
          <div class="rec-timer" id="recTimer">00:00</div>
        </div>
        <button class="btn btn-outline" onclick="transcribeLatest()" id="transcribeBtn" style="display:none">
          📝 Trascrivi (AI)
        </button>
      </div>

      <div id="audioList" class="audio-list"></div>
    </div>

    <hr class="divider">

    <!-- TRASCRIZIONE / APPUNTI -->
    <div class="notes-section">
      <div class="section-title">📝 Appunti della Lezione</div>

      <div style="position:relative">
        <div
          id="notesContent"
          class="transcript-box editable"
          contenteditable="true"
          spellcheck="true"
          oninput="updateWordCount()"
        ></div>
        <div id="notesPlaceholder" class="transcript-placeholder">Scrivi qui i tuoi appunti, oppure usa la registrazione per trascrivere automaticamente...</div>
      </div>

      <div class="transcript-info">
        <span id="notesWordCount">0 parole</span>
        <span id="notesSavedStatus"></span>
      </div>

      <div class="actions">
        <button class="btn btn-outline" onclick="copyText('notes')">📋 Copia Testo</button>
        <button class="btn btn-gold" onclick="exportPDF('notes')">📄 Esporta PDF</button>
        <button class="btn btn-primary" onclick="saveSession()">💾 Salva Lezione</button>
      </div>
    </div>

    <hr class="divider">

    <!-- AI ORGANIZZA -->
    <div class="ai-section">
      <div class="section-title">✨ Organizza con AI</div>

      <div class="ai-options">
        <button class="ai-opt-btn active" onclick="selectAiMode(this, 'organize')" id="mode-organize">
          <span class="opt-icon">📐</span>
          <strong>Struttura</strong>
          <span class="opt-desc">Organizza in sezioni con titoli</span>
        </button>
        <button class="ai-opt-btn" onclick="selectAiMode(this, 'summary')" id="mode-summary">
          <span class="opt-icon">🔍</span>
          <strong>Riassunto</strong>
          <span class="opt-desc">Sintesi dei punti chiave</span>
        </button>
        <button class="ai-opt-btn" onclick="selectAiMode(this, 'flashcards')" id="mode-flashcards">
          <span class="opt-icon">🃏</span>
          <strong>Flashcard</strong>
          <span class="opt-desc">Domande & risposte di ripasso</span>
        </button>
        <button class="ai-opt-btn" onclick="selectAiMode(this, 'mindmap')" id="mode-mindmap">
          <span class="opt-icon">🧠</span>
          <strong>Mappa Concetti</strong>
          <span class="opt-desc">Schema gerarchico dei concetti</span>
        </button>
        <button class="ai-opt-btn" onclick="selectAiMode(this, 'improve')" id="mode-improve">
          <span class="opt-icon">✏️</span>
          <strong>Migliora</strong>
          <span class="opt-desc">Correggi e arricchisci gli appunti</span>
        </button>
        <button class="ai-opt-btn" onclick="selectAiMode(this, 'quiz')" id="mode-quiz">
          <span class="opt-icon">🎯</span>
          <strong>Quiz</strong>
          <span class="opt-desc">Genera domande di verifica</span>
        </button>
      </div>

      <button class="btn btn-sage" onclick="runAI()" style="width:100%; justify-content:center; margin-bottom:16px">
        ✨ Elabora con AI
      </button>

      <div class="ai-result" id="aiResult">
        <span style="color:#c0b8a8; font-style:italic">Il risultato dell'AI apparirà qui...</span>
      </div>

      <div class="actions" id="aiActions" style="display:none">
        <button class="btn btn-outline" onclick="copyText('ai')">📋 Copia Testo AI</button>
        <button class="btn btn-gold" onclick="exportPDF('ai')">📄 Esporta PDF AI</button>
        <button class="btn btn-outline" onclick="useAsNotes()">📝 Usa come Appunti</button>
      </div>
    </div>

  </div>

  <!-- TAB: LEZIONI SALVATE -->
  <div id="tab-salvate" class="tab-panel">
    <div class="sessions-section">
      <div class="section-title">📚 Lezioni Salvate</div>
      <div id="sessionsList" class="sessions-list"></div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let timerInterval = null;
let seconds = 0;
let recordings = [];
let currentAiMode = 'organize';
let aiText = '';

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const d = new Date();
  document.getElementById('currentDate').textContent =
    d.toLocaleDateString('it-IT', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  document.getElementById('metaDate').value = d.toISOString().split('T')[0];
  loadSessions();

  const notes = document.getElementById('notesContent');
  notes.addEventListener('input', () => {
    const has = notes.textContent.trim().length > 0;
    document.getElementById('notesPlaceholder').style.display = has ? 'none' : 'block';
  });
});

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'salvate') loadSessions();
}

// ─── RECORDING ────────────────────────────────────────────────────────────────
async function toggleRecording() {
  if (!isRecording) await startRecording();
  else stopRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = saveRecording;
    mediaRecorder.start();
    isRecording = true;
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds/60)).padStart(2,'0');
      const s = String(seconds%60).padStart(2,'0');
      document.getElementById('recTimer').textContent = `${m}:${s}`;
    }, 1000);
    const btn = document.getElementById('recBtn');
    btn.className = 'btn-rec recording';
    btn.textContent = '⏹';
    document.getElementById('recLabel').innerHTML = `<span class="rec-dot"></span>Registrazione in corso...`;
  } catch(e) {
    showToast('Microfono non disponibile. Controlla i permessi.', 'error');
  }
}

function stopRecording() {
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  clearInterval(timerInterval);
  isRecording = false;
  const btn = document.getElementById('recBtn');
  btn.className = 'btn-rec idle';
  btn.textContent = '🎙';
  document.getElementById('recLabel').textContent = 'Registrazione completata';
}

function saveRecording() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const url = URL.createObjectURL(blob);
  const duration = seconds;
  recordings.push({ url, blob, duration, time: new Date().toLocaleTimeString('it-IT') });
  renderAudioList();
  document.getElementById('transcribeBtn').style.display = 'inline-flex';
}

function renderAudioList() {
  const el = document.getElementById('audioList');
  el.innerHTML = recordings.map((r, i) => `
    <div class="audio-item">
      <audio controls src="${r.url}"></audio>
      <span class="audio-meta">Rec ${i+1} · ${r.time} · ${Math.floor(r.duration/60)}:${String(r.duration%60).padStart(2,'0')}</span>
      <button class="s-btn del" onclick="deleteRecording(${i})">✕</button>
    </div>
  `).join('');
}

function deleteRecording(i) {
  recordings.splice(i, 1);
  renderAudioList();
  if (recordings.length === 0) document.getElementById('transcribeBtn').style.display = 'none';
}

// ─── TRANSCRIBE (AI) ──────────────────────────────────────────────────────────
async function transcribeLatest() {
  if (recordings.length === 0) return;

  // For browser environment, we can't do real audio transcription without Whisper
  // We'll prompt the AI to generate example transcription notes
  const notes = document.getElementById('notesContent');
  const subject = document.getElementById('metaSubject').value || 'lezione';

  showToast('Trascrizione: incolla manualmente o usa il testo dopo la registrazione.', 'error');

  // Offer to add placeholder
  const existing = notes.textContent.trim();
  if (!existing) {
    notes.textContent = `[Trascrizione registrazione ${recordings.length} - ${new Date().toLocaleTimeString('it-IT')}]\n\nIncolla qui il testo trascritto o scrivi i tuoi appunti...`;
    document.getElementById('notesPlaceholder').style.display = 'none';
    updateWordCount();
  }
}

// ─── WORD COUNT ───────────────────────────────────────────────────────────────
function updateWordCount() {
  const text = document.getElementById('notesContent').textContent.trim();
  const words = text ? text.split(/\s+/).length : 0;
  document.getElementById('notesWordCount').textContent = `${words} parole`;
}

// ─── AI MODE ──────────────────────────────────────────────────────────────────
function selectAiMode(btn, mode) {
  document.querySelectorAll('.ai-opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentAiMode = mode;
}

async function runAI() {
  const notes = document.getElementById('notesContent').textContent.trim();
  if (!notes) {
    showToast('Scrivi prima degli appunti da elaborare!', 'error');
    return;
  }

  const resultEl = document.getElementById('aiResult');
  resultEl.innerHTML = `
    <div class="ai-loading">
      <div class="dots"><span></span><span></span><span></span></div>
      Elaborazione in corso...
    </div>
  `;
  document.getElementById('aiActions').style.display = 'none';

  const subject = document.getElementById('metaSubject').value || 'la lezione';
  const lessonTitle = document.getElementById('metaTitle').value || '';

  const prompts = {
    organize: `Sei un assistente per studenti italiani. Organizza questi appunti di ${subject} in modo chiaro e strutturato con: titoli di sezione, sotto-titoli, punti chiave in formato bullet. Mantieni tutto in italiano. Appunti:\n\n${notes}`,
    summary: `Sei un assistente per studenti italiani. Crea un riassunto conciso ma completo di questi appunti di ${subject}. Evidenzia i concetti fondamentali, le definizioni importanti e i punti chiave. In italiano. Appunti:\n\n${notes}`,
    flashcards: `Sei un assistente per studenti italiani. Genera 8-12 flashcard di ripasso da questi appunti di ${subject}. Formato: DOMANDA: [domanda]\nRISPOSTA: [risposta]\n\nSii preciso e utile per lo studio. In italiano. Appunti:\n\n${notes}`,
    mindmap: `Sei un assistente per studenti italiani. Crea una mappa concettuale testuale gerarchica di questi appunti di ${subject}. Usa indentazione e simboli (→, •, ◦) per mostrare le relazioni tra i concetti. In italiano. Appunti:\n\n${notes}`,
    improve: `Sei un assistente per studenti italiani. Migliora questi appunti di ${subject}: correggi eventuali errori, completa frasi incomplete, aggiungi chiarezza dove necessario, mantieni lo stile degli appunti ma rendili più chiari e completi. In italiano. Appunti:\n\n${notes}`,
    quiz: `Sei un assistente per studenti italiani. Genera un quiz di 8 domande (mix di aperta, risposta multipla e vero/falso) basato su questi appunti di ${subject}. Includi le risposte corrette alla fine. In italiano. Appunti:\n\n${notes}`
  };

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: [{ role: "user", content: prompts[currentAiMode] }]
      })
    });

    if (!response.ok) throw new Error(`API error ${response.status}`);
    const data = await response.json();
    aiText = data.content.map(c => c.text || '').join('\n');

    resultEl.innerHTML = `
      <span class="ai-badge">✨ AI</span>
      ${aiText.replace(/\n/g, '<br>')}
    `;
    document.getElementById('aiActions').style.display = 'flex';
    showToast('Elaborazione completata!', 'success');

  } catch(e) {
    resultEl.innerHTML = `<span style="color:var(--rust)">Errore nell'elaborazione AI. Controlla la connessione.</span>`;
    showToast('Errore AI: ' + e.message, 'error');
  }
}

function useAsNotes() {
  if (!aiText) return;
  const notes = document.getElementById('notesContent');
  notes.textContent = aiText;
  document.getElementById('notesPlaceholder').style.display = 'none';
  updateWordCount();
  showToast('Testo AI usato come appunti!', 'success');
}

// ─── COPY ─────────────────────────────────────────────────────────────────────
function copyText(source) {
  let text = '';
  if (source === 'notes') {
    text = document.getElementById('notesContent').textContent;
  } else {
    text = aiText;
  }

  if (!text.trim()) {
    showToast('Nessun testo da copiare.', 'error');
    return;
  }

  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ Testo copiato negli appunti!', 'success');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ Testo copiato!', 'success');
  });
}

// ─── EXPORT PDF ───────────────────────────────────────────────────────────────
function exportPDF(source) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });

  const subject = document.getElementById('metaSubject').value || 'Lezione';
  const teacher = document.getElementById('metaTeacher').value || '';
  const title = document.getElementById('metaTitle').value || 'Appunti';
  const date = document.getElementById('metaDate').value
    ? new Date(document.getElementById('metaDate').value).toLocaleDateString('it-IT')
    : new Date().toLocaleDateString('it-IT');

  const text = source === 'notes'
    ? document.getElementById('notesContent').textContent
    : aiText;

  if (!text.trim()) {
    showToast('Nessun testo da esportare.', 'error');
    return;
  }

  const W = 210, M = 20, contentW = W - M*2;

  // Background
  doc.setFillColor(250, 248, 243);
  doc.rect(0, 0, W, 297, 'F');

  // Red margin line
  doc.setDrawColor(184, 92, 56);
  doc.setLineWidth(0.4);
  doc.line(28, 0, 28, 297);

  // Header bar
  doc.setFillColor(26, 18, 8);
  doc.rect(0, 0, W, 36, 'F');

  // Title in header
  doc.setTextColor(201, 168, 76);
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  doc.text('ClassNotes', 14, 22);

  doc.setTextColor(250, 248, 243);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('Quaderno Digitale', 14, 30);

  // Subject + date on right
  doc.setTextColor(201, 168, 76);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text(subject, W - M, 18, { align: 'right' });
  doc.setTextColor(220, 215, 200);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.text(date, W - M, 26, { align: 'right' });

  let y = 48;

  // Lesson title
  doc.setTextColor(26, 18, 8);
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text(title || 'Appunti della Lezione', M + 14, y);
  y += 6;

  // Metadata line
  doc.setFontSize(9);
  doc.setFont('helvetica', 'italic');
  doc.setTextColor(138, 122, 90);
  const meta = [teacher && `Prof. ${teacher}`, date].filter(Boolean).join(' · ');
  if (meta) { doc.text(meta, M + 14, y); y += 5; }

  // Gold divider
  doc.setDrawColor(201, 168, 76);
  doc.setLineWidth(0.8);
  doc.line(M + 14, y, W - M, y);
  y += 3;

  // AI badge if AI source
  if (source === 'ai') {
    doc.setFillColor(90, 122, 94);
    doc.roundedRect(M + 14, y, 30, 6, 1, 1, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    doc.text('✨ ELABORATO CON AI', M + 17, y + 4.2);
    y += 10;
  } else {
    y += 6;
  }

  // Lined background for content area
  doc.setDrawColor(200, 195, 185);
  doc.setLineWidth(0.2);
  for (let lineY = y; lineY < 290; lineY += 7) {
    doc.line(M + 14, lineY, W - M, lineY);
  }

  // Content text
  doc.setTextColor(26, 18, 8);
  doc.setFontSize(10.5);
  doc.setFont('helvetica', 'normal');

  const lines = doc.splitTextToSize(text, contentW - 14);
  const lineH = 7;
  const pageH = 285;

  lines.forEach(line => {
    if (y + lineH > pageH) {
      doc.addPage();

      // New page: lined bg
      doc.setFillColor(250, 248, 243);
      doc.rect(0, 0, W, 297, 'F');
      doc.setDrawColor(184, 92, 56);
      doc.setLineWidth(0.4);
      doc.line(28, 0, 28, 297);
      doc.setDrawColor(200, 195, 185);
      doc.setLineWidth(0.2);
      for (let lineY = 20; lineY < 290; lineY += 7) {
        doc.line(M + 14, lineY, W - M, lineY);
      }

      y = 22;
      doc.setTextColor(26, 18, 8);
      doc.setFontSize(10.5);
      doc.setFont('helvetica', 'normal');
    }
    doc.text(line, M + 14, y);
    y += lineH;
  });

  // Footer
  const pageCount = doc.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(160, 145, 120);
    doc.setFont('helvetica', 'italic');
    doc.text(`${subject} · ${title} · pag. ${i}/${pageCount}`, W/2, 292, { align: 'center' });
  }

  const filename = `${subject}_${title}_${date}`.replace(/[^a-zA-Z0-9_]/g, '_') + '.pdf';
  doc.save(filename);
  showToast('📄 PDF esportato!', 'success');
}

// ─── SESSIONS ─────────────────────────────────────────────────────────────────
function saveSession() {
  const notesEl = document.getElementById('notesContent');
  const notes = notesEl.textContent.trim();
  const subject = document.getElementById('metaSubject').value;
  const teacher = document.getElementById('metaTeacher').value;
  const title = document.getElementById('metaTitle').value;
  const date = document.getElementById('metaDate').value;

  if (!notes && !subject) {
    showToast('Aggiungi almeno una materia o degli appunti prima di salvare.', 'error');
    return;
  }

  const sessions = getSessions();
  const session = {
    id: Date.now(),
    subject, teacher, title, date,
    notes, aiText,
    savedAt: new Date().toISOString()
  };
  sessions.unshift(session);
  localStorage.setItem('classnotes_sessions', JSON.stringify(sessions));
  showToast('✓ Lezione salvata!', 'success');
  document.getElementById('notesSavedStatus').textContent = 'Salvato ✓';
  setTimeout(() => document.getElementById('notesSavedStatus').textContent = '', 3000);
}

function getSessions() {
  try { return JSON.parse(localStorage.getItem('classnotes_sessions') || '[]'); }
  catch { return []; }
}

function loadSessions() {
  const sessions = getSessions();
  const el = document.getElementById('sessionsList');
  if (sessions.length === 0) {
    el.innerHTML = '<div class="empty-state">Nessuna lezione salvata ancora.<br>Crea la prima lezione!</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-card">
      <div>
        <div class="s-title">${s.subject || 'Senza materia'} — ${s.title || 'Senza titolo'}</div>
        <div class="s-meta">
          ${s.date ? new Date(s.date).toLocaleDateString('it-IT') : ''} 
          ${s.teacher ? '· ' + s.teacher : ''}
          · ${(s.notes || '').split(/\s+/).filter(Boolean).length} parole
        </div>
      </div>
      <div class="session-actions">
        <button class="s-btn" onclick="loadSession(${s.id})">📂 Apri</button>
        <button class="s-btn" onclick="exportSessionPDF(${s.id})">📄 PDF</button>
        <button class="s-btn del" onclick="deleteSession(${s.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

function loadSession(id) {
  const s = getSessions().find(s => s.id === id);
  if (!s) return;
  document.getElementById('metaSubject').value = s.subject || '';
  document.getElementById('metaTeacher').value = s.teacher || '';
  document.getElementById('metaTitle').value = s.title || '';
  document.getElementById('metaDate').value = s.date || '';
  const notesEl = document.getElementById('notesContent');
  notesEl.textContent = s.notes || '';
  document.getElementById('notesPlaceholder').style.display = s.notes ? 'none' : 'block';
  aiText = s.aiText || '';
  if (aiText) {
    document.getElementById('aiResult').innerHTML = `<span class="ai-badge">✨ AI</span>${aiText.replace(/\n/g,'<br>')}`;
    document.getElementById('aiActions').style.display = 'flex';
  }
  updateWordCount();
  switchTab('nuova');
  showToast('Lezione caricata!', 'success');
}

function exportSessionPDF(id) {
  const s = getSessions().find(s => s.id === id);
  if (!s) return;
  document.getElementById('metaSubject').value = s.subject || '';
  document.getElementById('metaTeacher').value = s.teacher || '';
  document.getElementById('metaTitle').value = s.title || '';
  document.getElementById('metaDate').value = s.date || '';
  document.getElementById('notesContent').textContent = s.notes || '';
  aiText = s.aiText || '';
  setTimeout(() => exportPDF('notes'), 100);
}

function deleteSession(id) {
  if (!confirm('Eliminare questa lezione?')) return;
  const sessions = getSessions().filter(s => s.id !== id);
  localStorage.setItem('classnotes_sessions', JSON.stringify(sessions));
  loadSessions();
  showToast('Lezione eliminata.', 'success');
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}
</script>

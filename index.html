<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0e17">
<title>Appunti Lezione</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #252336;
    --accent: #ff6b35;
    --accent2: #a7c4f2;
    --text: #fffffe;
    --muted: #7d7a9a;
    --rec: #ff3b30;
    --success: #34c759;
    --border: rgba(167,196,242,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  header .logo span { color: var(--accent2); }
  .header-meta {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 12px 16px;
    border: none;
    background: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── PAGES ── */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  /* ── RECORD PAGE ── */
  .record-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 20px 0;
  }

  .mic-ring {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: all 0.3s;
  }
  .mic-ring.recording {
    border-color: var(--rec);
    box-shadow: 0 0 0 0 rgba(255,59,48,0.4);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.4); }
    70% { box-shadow: 0 0 0 20px rgba(255,59,48,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); }
  }
  .mic-icon { font-size: 48px; }

  .rec-status {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }
  .rec-status.live { color: var(--rec); }

  .timer {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 2px;
  }

  .rec-controls {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .btn-rec {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: var(--rec);
    color: white;
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,59,48,0.35);
  }
  .btn-rec:active { transform: scale(0.93); }
  .btn-rec.recording { background: #333; box-shadow: none; }

  .btn-small {
    padding: 10px 20px;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-small:active { opacity: 0.75; }
  .btn-small.accent { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-small.blue { background: var(--accent2); border-color: var(--accent2); color: #0f0e17; }
  .btn-small:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── TRANSCRIPT LIVE ── */
  .transcript-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    min-height: 120px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    width: 100%;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .transcript-box .placeholder { color: var(--muted); font-style: italic; }

  /* ── SECTION TITLES ── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }

  textarea.edit-area {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    resize: none;
    min-height: 200px;
  }

  /* ── LESSON LIST ── */
  .lesson-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .lesson-item:active { background: var(--surface); }
  .lesson-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .lesson-info { flex: 1; min-width: 0; }
  .lesson-name {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lesson-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .lesson-del {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }

  /* ── DETAIL VIEW ── */
  .detail-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .back-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .detail-title {
    font-size: 18px;
    font-weight: 800;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .action-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  /* ── AI PANEL ── */
  .ai-prompt-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .ai-select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    cursor: pointer;
    outline: none;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,107,53,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--success);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 24px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
  }
  .nav-btn {
    flex: 1;
    padding: 12px 4px 16px;
    border: none;
    background: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn span { font-size: 22px; }

  /* ── SUBJECT INPUT ── */
  .subject-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 16px;
    outline: none;
    margin-bottom: 16px;
  }
  .subject-input::placeholder { color: var(--muted); font-weight: 400; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; line-height: 1.5; }

  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .tag.orange { background: rgba(255,107,53,0.15); color: var(--accent); }
  .tag.blue { background: rgba(167,196,242,0.15); color: var(--accent2); }

  /* Scrollable content area */
  #page-record, #page-lessons, #page-ai { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="logo">📖 appunti<span>AI</span></div>
  <div class="header-meta" id="header-date"></div>
</header>

<!-- PAGES -->
<div id="page-record" class="page active">
  <div class="record-center">
    <div class="mic-ring" id="micRing">
      <span class="mic-icon" id="micIcon">🎙️</span>
    </div>
    <div class="rec-status" id="recStatus">Premi per iniziare la registrazione</div>
    <div class="timer" id="timer">00:00</div>

    <div class="rec-controls">
      <button class="btn-small" id="btnPause" disabled>⏸ Pausa</button>
      <button class="btn-rec" id="btnRecord" onclick="toggleRecord()">⏺</button>
      <button class="btn-small" id="btnSave" disabled onclick="saveLesson()">💾 Salva</button>
    </div>
  </div>

  <input class="subject-input" id="subjectInput" placeholder="Nome lezione / materia..." maxlength="80">

  <div class="section-title">Trascrizione in tempo reale</div>
  <div class="transcript-box" id="liveTranscript">
    <span class="placeholder">Il testo trascritto apparirà qui durante la registrazione...</span>
  </div>

  <div style="height:16px"></div>
  <div class="section-title">Note aggiuntive (opzionale)</div>
  <div class="card">
    <textarea class="edit-area" id="extraNotes" placeholder="Aggiungi note manuali..." style="min-height:80px"></textarea>
  </div>
</div>

<!-- LESSONS LIST -->
<div id="page-lessons" class="page">
  <div id="lessonsContainer"></div>
</div>

<!-- AI PAGE -->
<div id="page-ai" class="page">
  <div id="aiContainer">
    <div class="empty-state">
      <div class="emoji">🤖</div>
      <p>Seleziona una lezione dalla lista<br>per organizzarla con l'AI</p>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('record',this)">
    <span>🎙️</span>REGISTRA
  </button>
  <button class="nav-btn" onclick="showPage('lessons',this)">
    <span>📚</span>LEZIONI
  </button>
  <button class="nav-btn" onclick="showPage('ai',this)">
    <span>✨</span>AI
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────
let recognition = null;
let isRecording = false;
let isPaused = false;
let timerInterval = null;
let seconds = 0;
let fullTranscript = '';
let interimText = '';
let lessons = JSON.parse(localStorage.getItem('appuntiLessons') || '[]');
let currentEditLesson = null;
let currentAILesson = null;

// ── INIT ──────────────────────────────────────────────────────
document.getElementById('header-date').textContent = new Date().toLocaleDateString('it-IT', { weekday:'short', day:'numeric', month:'long', year:'numeric' });

// ── PAGE NAV ──────────────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name === 'lessons') renderLessons();
  if(name === 'ai') renderAIPage();
}

// ── TIMER ──────────────────────────────────────────────────────
function startTimer() {
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerInterval = null; }
function resetTimer() { seconds = 0; document.getElementById('timer').textContent = '00:00'; }

// ── RECOGNITION ────────────────────────────────────────────────
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { showToast('⚠️ Questo browser non supporta il riconoscimento vocale'); return null; }
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'it-IT';
  r.onresult = e => {
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++) {
      if(e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    interimText = interim;
    updateTranscriptDisplay();
  };
  r.onerror = err => {
    if(err.error !== 'no-speech') showToast('Errore microfono: ' + err.error);
  };
  r.onend = () => { if(isRecording && !isPaused) r.start(); };
  return r;
}

function updateTranscriptDisplay() {
  const box = document.getElementById('liveTranscript');
  const combined = fullTranscript + (interimText ? '<em style="color:var(--muted)">' + interimText + '</em>' : '');
  box.innerHTML = combined || '<span class="placeholder">Il testo trascritto apparirà qui...</span>';
  box.scrollTop = box.scrollHeight;
}

// ── RECORD ─────────────────────────────────────────────────────
function toggleRecord() {
  if(!isRecording) startRecording();
  else stopRecording();
}

function startRecording() {
  recognition = initRecognition();
  if(!recognition) return;
  fullTranscript = '';
  interimText = '';
  isRecording = true;
  isPaused = false;
  recognition.start();
  resetTimer();
  startTimer();
  document.getElementById('micRing').classList.add('recording');
  document.getElementById('micIcon').textContent = '🔴';
  document.getElementById('recStatus').textContent = '● REGISTRAZIONE IN CORSO';
  document.getElementById('recStatus').className = 'rec-status live';
  document.getElementById('btnRecord').textContent = '⏹';
  document.getElementById('btnRecord').classList.add('recording');
  document.getElementById('btnPause').disabled = false;
  document.getElementById('btnSave').disabled = false;
  document.getElementById('liveTranscript').innerHTML = '<span class="placeholder">In ascolto...</span>';
}

function stopRecording() {
  isRecording = false;
  isPaused = false;
  if(recognition) { recognition.onend = null; recognition.stop(); }
  stopTimer();
  document.getElementById('micRing').classList.remove('recording');
  document.getElementById('micIcon').textContent = '🎙️';
  document.getElementById('recStatus').textContent = 'Registrazione terminata';
  document.getElementById('recStatus').className = 'rec-status';
  document.getElementById('btnRecord').textContent = '⏺';
  document.getElementById('btnRecord').classList.remove('recording');
  document.getElementById('btnPause').disabled = true;
  document.getElementById('btnPause').textContent = '⏸ Pausa';
  updateTranscriptDisplay();
}

document.getElementById('btnPause').onclick = () => {
  if(!isPaused) {
    isPaused = true;
    recognition.onend = null;
    recognition.stop();
    stopTimer();
    document.getElementById('btnPause').textContent = '▶ Riprendi';
    document.getElementById('recStatus').textContent = '⏸ In pausa';
    document.getElementById('recStatus').className = 'rec-status';
    document.getElementById('micRing').classList.remove('recording');
  } else {
    isPaused = false;
    recognition.start();
    startTimer();
    document.getElementById('btnPause').textContent = '⏸ Pausa';
    document.getElementById('recStatus').textContent = '● REGISTRAZIONE IN CORSO';
    document.getElementById('recStatus').className = 'rec-status live';
    document.getElementById('micRing').classList.add('recording');
  }
};

// ── SAVE LESSON ────────────────────────────────────────────────
function saveLesson() {
  const name = document.getElementById('subjectInput').value.trim() || 'Lezione ' + new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'});
  const extra = document.getElementById('extraNotes').value.trim();
  const lesson = {
    id: Date.now(),
    name,
    date: new Date().toISOString(),
    transcript: fullTranscript.trim(),
    notes: extra,
    aiNotes: '',
    duration: seconds
  };
  lessons.unshift(lesson);
  saveLessons();
  showToast('✅ Lezione salvata!');
  // reset
  fullTranscript = '';
  interimText = '';
  document.getElementById('liveTranscript').innerHTML = '<span class="placeholder">Il testo trascritto apparirà qui...</span>';
  document.getElementById('subjectInput').value = '';
  document.getElementById('extraNotes').value = '';
  document.getElementById('btnSave').disabled = true;
  resetTimer();
}

function saveLessons() { localStorage.setItem('appuntiLessons', JSON.stringify(lessons)); }

// ── LESSONS LIST ───────────────────────────────────────────────
function renderLessons() {
  const c = document.getElementById('lessonsContainer');
  if(!lessons.length) {
    c.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>Nessuna lezione salvata.<br>Registra la tua prima lezione!</p></div>';
    return;
  }
  c.innerHTML = lessons.map((l,i) => `
    <div class="lesson-item" onclick="openLesson(${i})">
      <div class="lesson-dot"></div>
      <div class="lesson-info">
        <div class="lesson-name">${esc(l.name)}</div>
        <div class="lesson-date">${formatDate(l.date)} · ${fmtDur(l.duration)}</div>
      </div>
      <button class="lesson-del" onclick="event.stopPropagation();deleteLesson(${i})">🗑️</button>
    </div>
  `).join('');
}

function deleteLesson(i) {
  if(confirm('Eliminare questa lezione?')) {
    lessons.splice(i,1);
    saveLessons();
    renderLessons();
    showToast('🗑️ Lezione eliminata');
  }
}

function openLesson(i) {
  currentEditLesson = lessons[i];
  const page = document.getElementById('page-lessons');
  page.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" onclick="renderLessons();document.getElementById('page-lessons').innerHTML='';renderLessons()">← Lista</button>
      <div class="detail-title">${esc(currentEditLesson.name)}</div>
    </div>
    <div class="lesson-date" style="color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;margin-bottom:16px">${formatDate(currentEditLesson.date)} · ${fmtDur(currentEditLesson.duration)}</div>

    <div class="section-title">Trascrizione</div>
    <div class="card">
      <textarea class="edit-area" id="detailTranscript">${esc(currentEditLesson.transcript)}</textarea>
    </div>
    <div class="action-row">
      <button class="btn-small accent" onclick="saveEdit()">💾 Salva modifiche</button>
      <button class="btn-small" onclick="copyText('detailTranscript')">📋 Copia testo</button>
      <button class="btn-small blue" onclick="exportPDF(lessons[${i}],'trascrizione')">📄 Esporta PDF</button>
    </div>

    ${currentEditLesson.notes ? `
    <div style="height:20px"></div>
    <div class="section-title">Note aggiuntive</div>
    <div class="card">
      <textarea class="edit-area" id="detailNotes">${esc(currentEditLesson.notes)}</textarea>
    </div>
    <div class="action-row">
      <button class="btn-small" onclick="copyText('detailNotes')">📋 Copia note</button>
    </div>` : ''}

    ${currentEditLesson.aiNotes ? `
    <div style="height:20px"></div>
    <div class="tag blue">✨ Elaborato dall'AI</div>
    <div class="section-title">Appunti organizzati AI</div>
    <div class="card">
      <textarea class="edit-area" id="detailAINotes">${esc(currentEditLesson.aiNotes)}</textarea>
    </div>
    <div class="action-row">
      <button class="btn-small" onclick="copyText('detailAINotes')">📋 Copia AI</button>
      <button class="btn-small blue" onclick="exportPDF(lessons[${i}],'ai')">📄 PDF AI</button>
    </div>` : `
    <div style="height:20px"></div>
    <button class="btn-small accent" onclick="goToAI(${i})" style="width:100%;justify-content:center;padding:14px">✨ Organizza con AI</button>
    `}
  `;
  // Re-expose lessons for inline onclick
  window.lessons = lessons;
}

function saveEdit() {
  if(!currentEditLesson) return;
  const t = document.getElementById('detailTranscript');
  const n = document.getElementById('detailNotes');
  const a = document.getElementById('detailAINotes');
  if(t) currentEditLesson.transcript = t.value;
  if(n) currentEditLesson.notes = n.value;
  if(a) currentEditLesson.aiNotes = a.value;
  saveLessons();
  showToast('✅ Salvato!');
}

function goToAI(i) {
  currentAILesson = lessons[i];
  showPage('ai', document.querySelectorAll('.nav-btn')[2]);
  renderAIPage();
}

// ── AI PAGE ────────────────────────────────────────────────────
function renderAIPage() {
  const c = document.getElementById('aiContainer');
  if(!lessons.length) {
    c.innerHTML = '<div class="empty-state"><div class="emoji">🤖</div><p>Nessuna lezione salvata.<br>Prima registra una lezione!</p></div>';
    return;
  }

  const opts = lessons.map((l,i) => `<option value="${i}" ${currentAILesson && currentAILesson.id === l.id ? 'selected':''}>📖 ${esc(l.name)}</option>`).join('');

  c.innerHTML = `
    <div class="section-title">Seleziona lezione</div>
    <select class="ai-select" id="aiLessonSelect" onchange="onAISelect(this.value)" style="width:100%;margin-bottom:16px">${opts}</select>

    <div class="section-title">Cosa vuoi fare?</div>
    <select class="ai-select" id="aiMode" style="width:100%;margin-bottom:16px">
      <option value="organizza">📋 Organizza e struttura gli appunti</option>
      <option value="riassumi">📝 Crea un riassunto conciso</option>
      <option value="schema">🗂️ Crea uno schema a punti</option>
      <option value="domande">❓ Genera domande di ripasso</option>
      <option value="flashcard">🃏 Crea flashcard studio</option>
      <option value="spiega">💡 Spiega i concetti chiave</option>
    </select>

    <button class="btn-small accent" id="btnAI" onclick="runAI()" style="width:100%;padding:14px;font-size:15px;margin-bottom:20px">✨ Elabora con AI</button>

    <div id="aiResultBox" style="display:none">
      <div class="tag blue">✨ Risultato AI</div>
      <div class="section-title" style="margin-top:8px">Appunti elaborati</div>
      <div class="card">
        <textarea class="edit-area" id="aiResultText" style="min-height:300px"></textarea>
      </div>
      <div class="action-row">
        <button class="btn-small" onclick="copyText('aiResultText')">📋 Copia testo</button>
        <button class="btn-small blue" onclick="exportAIPDF()">📄 Esporta PDF</button>
        <button class="btn-small accent" onclick="saveAIToLesson()">💾 Salva nella lezione</button>
      </div>
    </div>
  `;

  // select correct lesson
  if(currentAILesson) {
    const idx = lessons.findIndex(l => l.id === currentAILesson.id);
    if(idx >= 0) document.getElementById('aiLessonSelect').value = idx;
  }
}

function onAISelect(i) {
  currentAILesson = lessons[parseInt(i)];
}

async function runAI() {
  const selIdx = parseInt(document.getElementById('aiLessonSelect').value);
  const lesson = lessons[selIdx];
  if(!lesson) return;
  const mode = document.getElementById('aiMode').value;
  currentAILesson = lesson;

  const prompts = {
    organizza: `Sei un assistente per studenti. Organizza e struttura questi appunti di lezione in modo chiaro, con titoli, sezioni e punti chiave ben formattati. Mantieni tutte le informazioni importanti.\n\nAppunti:\n${lesson.transcript}\n\n${lesson.notes ? 'Note aggiuntive:\n'+lesson.notes : ''}`,
    riassumi: `Crea un riassunto conciso ma completo di questi appunti di lezione, evidenziando i concetti fondamentali.\n\nAppunti:\n${lesson.transcript}`,
    schema: `Trasforma questi appunti in uno schema dettagliato a punti e sottopunti, ben organizzato per lo studio.\n\nAppunti:\n${lesson.transcript}`,
    domande: `Basandoti su questi appunti, genera 10-15 domande di ripasso con le relative risposte per aiutare lo studente a preparare l'esame.\n\nAppunti:\n${lesson.transcript}`,
    flashcard: `Crea 10-15 flashcard di studio (formato: FRONTE: domanda/termine | RETRO: risposta/definizione) basate su questi appunti.\n\nAppunti:\n${lesson.transcript}`,
    spiega: `Identifica e spiega in modo chiaro e approfondito i 5-8 concetti chiave presenti in questi appunti.\n\nAppunti:\n${lesson.transcript}`
  };

  const btn = document.getElementById('btnAI');
  btn.innerHTML = '<span class="spinner"></span>Elaborazione...';
  btn.disabled = true;
  document.getElementById('aiResultBox').style.display = 'none';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompts[mode] }]
      })
    });
    const data = await resp.json();
    const result = data.content?.map(b => b.text || '').join('\n') || 'Nessun risultato';
    document.getElementById('aiResultText').value = result;
    document.getElementById('aiResultBox').style.display = 'block';
    document.getElementById('aiResultBox').scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    showToast('❌ Errore AI: ' + e.message);
  } finally {
    btn.innerHTML = '✨ Elabora con AI';
    btn.disabled = false;
  }
}

function saveAIToLesson() {
  if(!currentAILesson) return;
  const result = document.getElementById('aiResultText').value;
  currentAILesson.aiNotes = result;
  saveLessons();
  showToast('✅ Salvato nella lezione!');
}

function exportAIPDF() {
  const result = document.getElementById('aiResultText')?.value || '';
  if(!currentAILesson || !result) return;
  const pseudo = { ...currentAILesson, aiNotes: result };
  exportPDF(pseudo, 'ai');
}

// ── PDF EXPORT ─────────────────────────────────────────────────
function exportPDF(lesson, type) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 18;
  const maxW = W - margin*2;
  let y = margin;

  // Header bar
  doc.setFillColor(15,14,23);
  doc.rect(0, 0, W, 28, 'F');
  doc.setTextColor(255,107,53);
  doc.setFontSize(16);
  doc.setFont('helvetica','bold');
  doc.text('AppuntiAI', margin, 16);
  doc.setTextColor(167,196,242);
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.text(type === 'ai' ? '✦ Elaborato dall\'AI' : '✦ Trascrizione lezione', margin + 42, 16);

  y = 38;
  // Title
  doc.setTextColor(15,14,23);
  doc.setFontSize(20);
  doc.setFont('helvetica','bold');
  doc.text(lesson.name, margin, y);
  y += 8;

  // Meta
  doc.setFontSize(9);
  doc.setFont('helvetica','normal');
  doc.setTextColor(100,100,120);
  doc.text(formatDate(lesson.date) + ' · ' + fmtDur(lesson.duration), margin, y);
  y += 6;
  // Line
  doc.setDrawColor(230,230,240);
  doc.setLineWidth(0.5);
  doc.line(margin, y, W-margin, y);
  y += 8;

  const content = type === 'ai' ? lesson.aiNotes : (lesson.transcript + (lesson.notes ? '\n\n--- Note ---\n' + lesson.notes : ''));

  doc.setTextColor(30,30,50);
  doc.setFontSize(11);
  doc.setFont('helvetica','normal');

  const lines = doc.splitTextToSize(content || '(Nessun contenuto)', maxW);
  for(const line of lines) {
    if(y + 7 > pageH - margin) {
      doc.addPage();
      y = margin;
    }
    doc.text(line, margin, y);
    y += 6.5;
  }

  // Footer
  const totalPages = doc.internal.getNumberOfPages();
  for(let p=1; p<=totalPages; p++) {
    doc.setPage(p);
    doc.setFontSize(8);
    doc.setTextColor(180,180,200);
    doc.text('AppuntiAI · Pagina ' + p + ' di ' + totalPages, W/2, pageH - 8, {align:'center'});
  }

  doc.save(lesson.name.replace(/[^a-z0-9]/gi,'_') + (type==='ai'?'_AI':'_trascrizione') + '.pdf');
  showToast('📄 PDF scaricato!');
}

// ── COPY TEXT ──────────────────────────────────────────────────
function copyText(id) {
  const el = document.getElementById(id);
  if(!el) return;
  const text = el.tagName === 'TEXTAREA' || el.tagName === 'INPUT' ? el.value : el.innerText;
  if(navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Testo copiato!'));
  } else {
    el.select();
    document.execCommand('copy');
    showToast('📋 Copiato!');
  }
}

// ── UTILS ──────────────────────────────────────────────────────
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(iso) {
  try { return new Date(iso).toLocaleDateString('it-IT', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return iso; }
}
function fmtDur(s) {
  if(!s) return '0s';
  const m = Math.floor(s/60), sec = s%60;
  return m ? m+'m '+sec+'s' : sec+'s';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
window.lessons = lessons;
</script>
